#  build image -> generate SBOM -> scan image -> create release -> attach SBOM

name: Release - Scan, SBOM, Publish, Deploy Production

on:
  push:
    tags:
      - "v*.*.*"
permissions:
  contents: write  #GitHub Release and Asset Attachment

env:
  IMAGE_NAME: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/notification-service

jobs:
  build-scan-publish-release:
    name: Build, Scan, Publish, Create Release
    runs-on: ubuntu-latest

#    outputs:
#      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  #یعنی تاریخچه کامل git را بگیر، نه فقط آخرین commit
          #برای releaseها معمولاً خوب است چون بعضی ابزارها یا release notes ممکن است به تاریخچه یا tagها نیاز داشته باشند. این انتخاب حرفه‌ای‌تری است.

      - name: Set release variables
        id: vars
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"  
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_ref=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

# GITHUB_REF_NAME =v1.2.0 -> Tag= v1.2.0 , VERSION= 1.2.0
      #در GitHub Actions اگر بخواهی خروجی یک step را به step بعدی بدهی، داخل فایل مخصوص GITHUB_OUTPUT می‌نویسی.
      #دسترسی در استپ های بعدی یه صورت مثلا ${{ steps.vars.outputs.tag }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name:  Verify project and generate SBOM
        run: mvn -B clean verify

      - name: Check SBOM files exist
        shell: bash
        run: |
          ls -la target || true
          test -f target/bom.xml
          test -f target/bom.json

#چون اگر plugin درست اجرا نشده باشد، نمی‌خواهی pipeline ادامه پیدا کند و آخر کار تازه بفهمی SBOM نداشتی#
      #test -f -> اگر فایل وجود نداشته باشد، command fail می‌شود و job متوقف می‌شود

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
#Buildx چیست؟   #نسخه پیشرفته‌تر build در داکر است. docker/build-push-action معمولاً با Buildx کار می‌کند.

      - name: Build Docker image locally
        uses: docker/build-push-action@v6
        with:
          context: .   #یعنی Dockerfile و فایل‌های build را از ریشه پروژه بردار
          push: false   #یعنی image را فعلاً به registry نفرست
          load: true  #یعنی image ساخته‌شده را داخل Docker engine همان runner لود کن تا commandهای بعدی و ابزارهایی مثل Trivy بتوانند آن را به صورت local ببینند.
          tags: ${{ steps.vars.outputs.image_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: image  #یعنی می‌خواهیم image داکر را اسکن کنیم، نه filesystem یا repo را
          image-ref: ${{ steps.vars.outputs.image_ref }}  #یعنی کدام image را اسکن کن
          format: table
          ignore-unfixed: true  #ون آسیب‌پذیری‌هایی که هنوز upstream fix ندارند، در خیلی از تیم‌ها فقط گزارش می‌شوند، نه fail.
          severity: HIGH,CRITICAL
          exit-code: '1'  # یعنی اگر vulnerability مطابق شرط پیدا شد، step fail شود.
          timeout: '15m'

      - name: Log in to docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Tag image as latest
        shell: bash
        run: |
          docker tag "${{ steps.vars.outputs.image_ref }}" "${{ steps.vars.outputs.latest_ref }}"

      - name: Push Docker images
        shell: bash
        run: |
          docker push "${{ steps.vars.outputs.image_ref }}"
          docker push "${{ steps.vars.outputs.latest_ref }}"


      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.vars.outputs.tag }}" \
            --generate-notes \
            --title "${{ steps.vars.outputs.tag }}"
#gh release create : یعنی با GitHub CLI یک release بساز.
# --generate-notes : GitHub خودش release notes اولیه را تولید می‌کند.
# چرا خوب است ?
      #چون هر نسخه رسمی‌ات یک صفحه release مشخص دارد که بعداً می‌توانی artifactها و metadata را به آن وصل کنی.

      - name: Attach SBOM files to Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.vars.outputs.tag }}" \
            "target/bom.xml#CycloneDX SBOM XML" \
            "target/bom.json#CycloneDX SBOM JSON" \
            --clobber

#چون release فقط image نیست.
  #تو می‌خواهی برای همان نسخه، سند وابستگی‌ها را هم منتشر کنی.
  # --clobber : اگر قبلاً assetی با همان نام وجود داشت، جایگزینش می‌کند.

