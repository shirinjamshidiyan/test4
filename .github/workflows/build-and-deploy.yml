name: Main - Build, Scan, Push, Deploy Staging
#  docker push shirinjam/email-service:tagname
on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: shirinjam/notification-service
#  IMAGE_NAME: ${{ vars.IMAGE_NAME }}

jobs:
  build-scan-push:
    name: Build, Scan, Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build application
        run: mvn -B clean verify

      - name: Login to Docker Hub Registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

      - name: Tag image as main
        run: docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:main

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:main

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-scan-push
    environment: staging

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying image $IMAGE_NAME:${{ github.sha }} to staging"
