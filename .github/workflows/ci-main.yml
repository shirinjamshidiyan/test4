#//این نسخه هنوز push نمی کند. فقط build می کند تا مطمئن شوی Dockerfile سالم است.
name: CI (main) + Docker build

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn -B clean verify

  docker-build:
    runs-on: ubuntu-latest
    needs: [ test ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: notification-service:main