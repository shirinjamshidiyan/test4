#//این نسخه هنوز push نمی کند. فقط build می کند تا مطمئن شوی Dockerfile سالم است.
name: CI (master) + Docker build

on:
  push:
    branches: master

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: build
        run: mvn -B clean verify

  docker-build:
    runs-on: ubuntu-latest
    needs: [ verify ]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker image only (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/notification-service:main