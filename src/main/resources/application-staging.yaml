
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  mail:
    host:  ${SPRING_MAIL_HOST} #   smtp.sendgrid.net
    port:  ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS}
    group-id: ${APP_KAFKA_GROUP_ID:notification-service}
    topic: ${APP_KAFKA_TOPIC:order-confirmed.v1}

  mail:
    from: ${APP_MAIL_FROM:no-reply@shirin.com}
  index:
    maxAttempts: ${APP_INDEX_MAXATTEMPTS:5}