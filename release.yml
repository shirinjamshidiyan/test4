#  اینجا Environment و secrets را هم وارد می کنیم.
name: Release and Deploy Production

on:
  push:
    branches: master
    tags:
      - "v*.*.*"
permissions:
  contents: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/notification-service

jobs:
  build-release:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and verify
        run: mvn -B clean verify

      - name: Extract release metadata
        id: meta
        run: |
          echo "image_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: boot-jar
          path: target/*.jar

     - name: Log in to GHCR
       uses: docker/login-action@v3
       with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

  - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            target/*.jar

deploy-production:
  needs: build-release
  runs-on: ubuntu-latest
  environment: production

  steps:
    - name: Deploy to production
      env:
        IMAGE_NAME: ${{ env.IMAGE_NAME }}
        IMAGE_TAG: ${{ needs.build-release.outputs.image_tag }}
      run: |
        echo "Deploying $IMAGE_NAME:$IMAGE_TAG to production"
        
        # مثال اگر Kubernetes داری:
        # kubectl set image deployment/notification-service \
        #   notification-service=$IMAGE_NAME:$IMAGE_TAG \
        #   --namespace=production
        
        # مثال اگر Helm داری:
        # helm upgrade --install notification-service ./helm/notification-service \
        #   --namespace production \
        #   --set image.repository=$IMAGE_NAME \
        #   --set image.tag=$IMAGE_TAG
        

  publish-image:
    runs-on: ubuntu-latest
    needs: [ build ]
    permissions:
      contents: read
      packages: write
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

#      - name: Download jar artifact
#        uses: actions/download-artifact@v4
#        with:
#          name: notification-qqqservice-jar
#          path: target/*.jar

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: docker.io/${{ github.repository_owner }}/notification-service:${{ github.ref_name }}